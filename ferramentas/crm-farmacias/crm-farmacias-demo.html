  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

1cias do grupo<\/span>\n        <\/div>\n      <\/div>\n      <div style=\"display:flex;align-items:center;gap:8px\">\n        <button onclick=\"{{ onExportCsv }}\" title=\"Baixar a aba atual como planilha CSV\" style=\"appearance:none;border:.5px solid #E2E3E8;background:#fff;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;color:#1C2445;padding:7px 12px;border-radius:10px\">Exportar CSV<\/button>\n        <button onclick=\"{{ onImportCsv }}\" title=\"Carregar uma planilha CSV na aba atual\" style=\"appearance:none;border:.5px solid #E2E3E8;background:#fff;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;color:#1C2445;padding:7px 12px;border-radius:10px\">Importar CSV<\/button>\n        <button onclick=\"{{ onReset }}\" title=\"Apagar todos os dados salvos neste navegador\" style=\"appearance:none;border:.5px solid #e6d2b5;background:#fff;cursor:pointer;font-family:inherit;font-size:12px;font-weight:500;color:#8a5d05;padding:7px 12px;border-radius:10px\">Limpar dados<\/button>\n        <input type=\"file\" accept=\".csv,text/csv\" ref=\"{{ setFileRef }}\" onchange=\"{{ onImportFile }}\" style=\"display:none\">\n        <div style=\"width:1px;height:22px;background:#E2E3E8;margin:0 4px\"><\/div>\n        <span style=\"font-size:12px;color:#61636E\">Comercial 1<\/span>\n        <div style=\"width:28px;height:28px;border-radius:50%;background:#CCF1F5;color:#1C2445;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600\">C1<\/div>\n      <\/div>\n    <\/div>\n  <\/header>\n\n  <!-- Tabs -->\n  <nav style=\"background:#ffffff;border-bottom:.5px solid #E2E3E8;position:sticky;top:0;z-index:5\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:0 28px;display:flex;gap:2px\">\n      <sc-for list=\"{{ tabs }}\" as=\"t\" hint-placeholder-count=\"4\">\n        <button onclick=\"{{ t.onClick }}\" style=\"{{ t.style }}\">{{ t.label }}<\/button>\n      <\/sc-for>\n    <\/div>\n  <\/nav>\n\n  <main style=\"max-width:1180px;margin:0 auto;padding:26px 28px 60px\">\n\n    <!-- ============ PAINEL ============ -->\n    <div style=\"{{ painelStyle }}\">\n      <!-- metric cards -->\n      <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px\">\n        <sc-for list=\"{{ metrics }}\" as=\"m\" hint-placeholder-count=\"4\">\n          <div style=\"{{ m.cardStyle }}\">\n            <span style=\"font-size:11.5px;font-weight:500;color:#61636E;letter-spacing:.01em\">{{ m.label }}<\/span>\n            <span style=\"{{ m.valueStyle }}\">{{ m.value }}<\/span>\n            <span style=\"font-size:11px;color:#94a0aa\">{{ m.sub }}<\/span>\n          <\/div>\n        <\/sc-for>\n      <\/div>\n\n      <div style=\"display:grid;grid-template-columns:1.35fr 1fr;gap:16px\">\n        <!-- funnel bar chart -->\n        <div style=\"background:#fff;border:.5px solid #E2E3E8;border-radius:14px;padding:18px 20px\">\n          <div style=\"font-size:12px;font-weight:600;color:#3a444d;margin-bottom:16px\">Farm\u00e1cias por etapa do funil<\/div>\n          <div style=\"display:flex;flex-direction:column;gap:11px\">\n            <sc-for list=\"{{ funnelBars }}\" as=\"b\" hint-placeholder-count=\"8\">\n              <div style=\"display:grid;grid-template-columns:150px 1fr 30px;align-items:center;gap:10px\">\n                <span style=\"font-size:11.5px;color:#525c65;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ b.label }}<\/span>\n                <div style=\"height:16px;background:#eef1f3;border-radius:3px;overflow:hidden\">\n                  <div style=\"{{ b.barStyle }}\"><\/div>\n                <\/div>\n                <span style=\"font-size:11.5px;font-weight:600;color:#3a444d;text-align:right\">{{ b.count }}<\/span>\n              <\/div>\n            <\/sc-for>\n          <\/div>\n        <\/div>\n\n        <!-- carteira summary mini-table -->\n        <div style=\"background:#fff;border:.5px solid #E2E3E8;border-radius:14px;padding:18px 20px\">\n          <div style=\"font-size:12px;font-weight:600;color:#3a444d;margin-bottom:14px\">Resumo da carteira ativa<\/div>\n          <div style=\"display:flex;flex-direction:column\">\n            <sc-for list=\"{{ carteiraResumo }}\" as=\"rs\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex;justify-content:space-between;align-items:baseline;padding:11px 0;border-bottom:.5px solid #eceef1\">\n                <span style=\"font-size:12px;color:#61636E\">{{ rs.label }}<\/span>\n                <span style=\"{{ rs.valStyle }}\">{{ rs.value }}<\/span>\n              <\/div>\n            <\/sc-for>\n            <div style=\"display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:.5px solid #eceef1\">\n              <span style=\"font-size:12px;color:#61636E\">Meta or\u00e7ada (m\u00eas) \u2014 R$<\/span>\n              <input type=\"text\" inputmode=\"numeric\" value=\"{{ painelEdits.vMetaGlobal }}\" onchange=\"{{ painelEdits.onMetaGlobal }}\" placeholder=\"{{ painelEdits.metaPlaceholder }}\" style=\"{{ painelEdits.pInput }}\">\n            <\/div>\n            <div style=\"font-size:10.5px;font-weight:600;color:#8D91A2;text-transform:uppercase;letter-spacing:.05em;padding:14px 0 4px\">Produtos contratados<\/div>\n            <div style=\"display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:.5px solid #eceef1\">\n              <span style=\"font-size:12px;color:#61636E\">Limite pontual (R$)<\/span>\n              <input type=\"text\" inputmode=\"numeric\" value=\"{{ painelEdits.vLimitePontual }}\" onchange=\"{{ painelEdits.onLimitePontual }}\" placeholder=\"0\" style=\"{{ painelEdits.pInput }}\">\n            <\/div>\n            <div style=\"display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:.5px solid #eceef1\">\n              <span style=\"font-size:12px;color:#61636E\">Limite rotativo (R$)<\/span>\n              <input type=\"text\" inputmode=\"numeric\" value=\"{{ painelEdits.vLimiteRotativo }}\" onchange=\"{{ painelEdits.onLimiteRotativo }}\" placeholder=\"0\" style=\"{{ painelEdits.pInput }}\">\n            <\/div>\n            <div style=\"display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:.5px solid #eceef1\">\n              <span style=\"font-size:12px;color:#61636E\">Contas digitais (qtd)<\/span>\n              <input type=\"text\" inputmode=\"numeric\" value=\"{{ painelEdits.vContasDigitais }}\" onchange=\"{{ painelEdits.onContasDigitais }}\" placeholder=\"0\" style=\"{{ painelEdits.pInput }}\">\n            <\/div>\n            <div style=\"display:flex;justify-content:space-between;align-items:center;padding:6px 0\">\n              <span style=\"font-size:12px;color:#61636E\">Maquininhas (qtd)<\/span>\n              <input type=\"text\" inputmode=\"numeric\" value=\"{{ painelEdits.vMaquininhas }}\" onchange=\"{{ painelEdits.onMaquininhas }}\" placeholder=\"0\" style=\"{{ painelEdits.pInput }}\">\n            <\/div>\n          <\/div>\n        <\/div>\n      <\/div>\n    <\/div>\n\n    <!-- ============ FUNIL ============ -->\n    <div style=\"{{ funilStyle }}\">\n    <div style=\"background:#fff;border:.5px solid #E2E3E8;border-radius:14px;overflow:hidden\">\n      <div style=\"{{ gHeadFunil }}\">\n        <div style=\"{{ gHeadCell }}\">Farm\u00e1cia<\/div>\n        <div style=\"{{ gHeadCell }}\">Produto de interesse<\/div>\n        <div style=\"{{ gHeadCell }}\">Etapa<\/div>\n        <div style=\"{{ gHeadCell }}\">Respons\u00e1vel<\/div>\n        <div style=\"{{ gHeadCell }}\">Pr\u00f3xima a\u00e7\u00e3o<\/div>\n        <div style=\"{{ gHeadCell }}\">Data<\/div>\n      <\/div>\n      <sc-if value=\"{{ funilEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"padding:36px 16px;text-align:center;font-size:12.5px;color:#8D91A2\">Nenhuma farm\u00e1cia no funil ainda. Cadastre um cliente na aba Carteira \u2014 ele entra automaticamente no onboarding e no funil.<\/div>\n      <\/sc-if>\n      <sc-for list=\"{{ funnelRows }}\" as=\"fr\" hint-placeholder-count=\"0\">\n        <div>\n          <div style=\"{{ gRowFunil }}\" onclick=\"{{ fr.onToggle }}\">\n            <div style=\"{{ gCellName }}\"><span style=\"color:#9aa2a9;margin-right:7px;font-size:10px\">{{ fr.chev }}<\/span>{{ fr.farmacia }}<\/div>\n            <div style=\"{{ gCell }}\">{{ fr.produto }}<\/div>\n            <div style=\"{{ gCell }}\"><span style=\"{{ fr.badgeStyle }}\">{{ fr.etapa }}<\/span><\/div>\n            <div style=\"{{ gCell }}\">{{ fr.responsavel }}<\/div>\n            <div style=\"{{ gCellMuted }}\">{{ fr.acao }}<\/div>\n            <div style=\"{{ gCellMono }}\"><input type=\"text\" value=\"{{ fr.dataValue }}\" onchange=\"{{ fr.onData }}\" onclick=\"{{ onRowStop }}\" title=\"Data do pr\u00f3ximo contato \u2014 edit\u00e1vel\" style=\"width:100%;box-sizing:border-box;padding:4px 6px;font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:#3a5f8a;background:transparent;border:.5px dashed #c3cbd2;border-radius:4px;outline:none\"><\/div>\n          <\/div>\n          <div style=\"{{ fr.detailStyle }}\">\n            <div style=\"grid-column:span 2\"><span style=\"{{ dLabel }}\">Etapa do funil<\/span>\n              <select value=\"{{ fr.etapaValue }}\" onchange=\"{{ fr.onEtapa }}\" style=\"{{ dEdit }}\">\n                <sc-for list=\"{{ stageNames }}\" as=\"sn\" hint-placeholder-count=\"8\">\n                  <option value=\"{{ sn }}\">{{ sn }}<\/option>\n                <\/sc-for>\n              <\/select>\n            <\/div>\n            <div style=\"grid-column:span 2\"><span style=\"{{ dLabel }}\">Pr\u00f3xima a\u00e7\u00e3o<\/span>\n              <input type=\"text\" value=\"{{ fr.acaoValue }}\" onchange=\"{{ fr.onAcao }}\" placeholder=\"Descreva a pr\u00f3xima a\u00e7\u00e3o\" style=\"{{ dEdit }}\">\n            <\/div>\n            <div><span style=\"{{ dLabel }}\">Contato do comercial<\/span><span style=\"{{ dVal }}\">{{ fr.contatoComercial }}<\/span><\/div>\n            <div><span style=\"{{ dLabel }}\">Telefone do cliente<\/span><span style=\"{{ dVal }}\">{{ fr.telefone }}<\/span><\/div>\n            <div><span style=\"{{ dLabel }}\">C\u00f3d. SAP<\/span><span style=\"{{ dVal }}\">{{ fr.sap }}<\/span><\/div>\n            <div><span style=\"{{ dLabel }}\">CNPJ<\/span><span style=\"{{ dVal }}\">{{ fr.cnpj }}<\/span><\/div>\n            <div style=\"grid-column:span 2\"><span style=\"{{ dLabel }}\">Endere\u00e7o<\/span><span style=\"{{ dVal }}\">{{ fr.endereco }}<\/span><\/div>\n            <div><span style=\"{{ dLabel }}\">Data de entrada<\/span><span style=\"{{ dVal }}\">{{ fr.entrada }}<\/span><\/div>\n            <div><span style=\"{{ dLabel }}\">Canal<\/span><span style=\"{{ dVal }}\">{{ fr.canal }}<\/span><\/div>\n            <div><span style=\"{{ dLabel }}\">Maquininhas (qtd)<\/span>\n              <select value=\"{{ fr.maqValue }}\" onchange=\"{{ fr.onMaq }}\" style=\"{{ dEdit }}\">\n                <sc-for list=\"{{ maqOptions }}\" as=\"mo\" hint-placeholder-count=\"16\">\n                  <option value=\"{{ mo }}\">{{ mo }}<\/option>\n                <\/sc-for>\n              <\/select>\n            <\/div>\n          <\/div>\n        <\/div>\n      <\/sc-for>\n    <\/div>\n    <\/div>\n\n    <!-- ============ ONBOARDING ============ -->\n    <div style=\"{{ onboardingStyle }}\">\n    <div style=\"background:#fff;border:.5px solid #E2E3E8;border-radius:14px;overflow:hidden\">\n      <div style=\"{{ gHeadOnb }}\">\n        <div style=\"{{ gHeadCell }}\">Farm\u00e1cia<\/div>\n        <div style=\"{{ gHeadCell }}\">Produto<\/div>\n        <div style=\"{{ gHeadCell }}\">Status prospec\u00e7\u00e3o<\/div>\n        <div style=\"{{ gHeadCell }}\">Status produto<\/div>\n        <div style=\"{{ gHeadCell }}\">Status Dock<\/div>\n        <div style=\"{{ gHeadCell }}\">Maquininha TEFTI<\/div>\n        <div style=\"{{ gHeadCell }}\">Termos assinados<\/div>\n        <div style=\"{{ gHeadCell }}\">Observa\u00e7\u00e3o / gargalo<\/div>\n      <\/div>\n      <sc-if value=\"{{ onbEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"padding:36px 16px;text-align:center;font-size:12.5px;color:#8D91A2\">Nenhum cliente em onboarding. Inclua um cliente na aba Carteira para iniciar o onboarding.<\/div>\n      <\/sc-if>\n      <sc-for list=\"{{ onboardingRows }}\" as=\"ob\" hint-placeholder-count=\"0\">\n        <div>\n          <div style=\"{{ gRowOnb }}\" onclick=\"{{ ob.onToggle }}\">\n            <div style=\"{{ gCellName }}\"><span style=\"color:#9aa2a9;margin-right:7px;font-size:10px\">{{ ob.chev }}<\/span>{{ ob.farmacia }}<\/div>\n            <div style=\"{{ gCell }}\">{{ ob.produto }}<\/div>\n            <div style=\"{{ gCell }}\"><span style=\"{{ ob.prospStyle }}\">{{ ob.statusProspeccao }}<\/span><\/div>\n            <div style=\"{{ gCell }}\"><span style=\"{{ ob.prodStyle }}\">{{ ob.statusProduto }}<\/span><\/div>\n            <div style=\"{{ gCell }}\"><span style=\"{{ ob.dockStyle }}\">{{ ob.dock }}<\/span><\/div>\n            <div style=\"{{ gCell }}\"><span style=\"{{ ob.tftiStyle }}\">{{ ob.tefti }}<\/span><\/div>\n            <div style=\"{{ gCell }}\"><span style=\"{{ ob.optStyle }}\">{{ ob.optin }}<\/span><\/div>\n            <div style=\"{{ gCellMuted }}\">{{ ob.obs }}<\/div>\n          <\/div>\n          <div style=\"{{ ob.detailStyle }}\">\n            <div><span style=\"{{ dLabel }}\">Status prospec\u00e7\u00e3o<\/span>\n              <select value=\"{{ ob.statusProspeccao }}\" onchange=\"{{ ob.onStatusProspeccao }}\" style=\"{{ dEdit }}\">\n                <sc-for list=\"{{ prospOptions }}\" as=\"po\" hint-placeholder-count=\"3\">\n                  <option value=\"{{ po }}\">{{ po }}<\/option>\n                <\/sc-for>\n              <\/select>\n            <\/div>\n            <div><span style=\"{{ dLabel }}\">Status produto<\/span>\n              <select value=\"{{ ob.statusProduto }}\" onchange=\"{{ ob.onStatusProduto }}\" style=\"{{ dEdit }}\">\n                <option>Pendente<\/option>\n                <option>Em configura\u00e7\u00e3o<\/option>\n                <option>Liberado<\/option>\n              <\/select>\n            <\/div>\n            <div><span style=\"{{ dLabel }}\">Status Dock<\/span>\n              <select value=\"{{ ob.dock }}\" onchange=\"{{ ob.onDock }}\" style=\"{{ dEdit }}\">\n                <option>Em an\u00e1lise<\/option>\n                <option>Aprovado<\/option>\n                <option>Pend\u00eancia documental<\/option>\n                <option>Reprovado<\/option>\n              <\/select>\n            <\/div>\n            <div><span style=\"{{ dLabel }}\">Maquininha TEFTI<\/span>\n              <select value=\"{{ ob.tefti }}\" onchange=\"{{ ob.onTefti }}\" style=\"{{ dEdit }}\">\n                <option>Aguardando envio<\/option>\n                <option>Enviada<\/option>\n                <option>Entregue<\/option>\n                <option>Instalada<\/option>\n              <\/select>\n            <\/div>\n            <div><span style=\"{{ dLabel }}\">Termos assinados<\/span>\n              <select value=\"{{ ob.optin }}\" onchange=\"{{ ob.onOptin }}\" style=\"{{ dEdit }}\">\n                <option>Sim<\/option>\n                <option>N\u00e3o<\/option>\n              <\/select>\n            <\/div>\n            <div><span style=\"{{ dLabel }}\">Rotina de atualiza\u00e7\u00e3o<\/span>\n              <select value=\"{{ ob.rotina }}\" onchange=\"{{ ob.onRotina }}\" style=\"{{ dEdit }}\">\n                <sc-for list=\"{{ rotinaOptions }}\" as=\"ro\" hint-placeholder-count=\"4\">\n                  <option value=\"{{ ro }}\">{{ ro }}<\/option>\n                <\/sc-for>\n              <\/select>\n            <\/div>\n            <div style=\"grid-column:span 4\"><span style=\"{{ dLabel }}\">Observa\u00e7\u00e3o / gargalo<\/span>\n              <textarea value=\"{{ ob.obs }}\" onchange=\"{{ ob.onObs }}\" placeholder=\"Descreva o gargalo do momento\" style=\"{{ dEditArea }}\"><\/textarea>\n            <\/div>\n          <\/div>\n        <\/div>\n      <\/sc-for>\n    <\/div>\n    <\/div>\n\n    <!-- ============ CARTEIRA ============ -->\n    <div style=\"{{ carteiraStyle }}\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:14px\">\n        <span style=\"font-size:12px;color:#7a848d\">Gerencie os clientes ativos \u2014 atualize TPV, meta or\u00e7ada, status e datas, ou inclua um novo cliente.<\/span>\n        <div style=\"display:flex;align-items:center;gap:8px\">\n          <button onclick=\"{{ onUpdateDock }}\" title=\"Subir o arquivo padr\u00e3o de transa\u00e7\u00f5es da Dock para atualizar o TPV automaticamente\" style=\"appearance:none;border:1px solid #1C2445;cursor:pointer;font-family:inherit;font-size:12.5px;font-weight:600;color:#1C2445;background:#fff;padding:9px 15px;border-radius:10px\">\u2191 Atualizar TPV (arquivo Dock)<\/button>\n          <input type=\"file\" accept=\".xlsx\" ref=\"{{ setDockRef }}\" onchange=\"{{ onDockFile }}\" style=\"display:none\">\n          <button onclick=\"{{ onNovoCliente }}\" style=\"appearance:none;border:none;cursor:pointer;font-family:inherit;font-size:12.5px;font-weight:600;color:#fff;background:#22C5AD;padding:9px 15px;border-radius:10px\">+ Novo cliente<\/button>\n        <\/div>\n      <\/div>\n      <div style=\"background:#fff;border:.5px solid #E2E3E8;border-radius:14px;overflow:hidden\">\n        <div style=\"{{ gHeadCart }}\">\n          <div style=\"{{ gHeadCell }}\">Farm\u00e1cia<\/div>\n          <div style=\"{{ gHeadCellR }}\">TPV adquir\u00eancia<\/div>\n          <div style=\"{{ gHeadCellR }}\">Meta or\u00e7ada<\/div>\n          <div style=\"{{ gHeadCell }}\">Atingimento<\/div>\n          <div style=\"{{ gHeadCell }}\">Adimpl\u00eancia<\/div>\n          <div style=\"{{ gHeadCell }}\">Renova\u00e7\u00e3o<\/div>\n          <div style=\"{{ gHeadCell }}\">Resp.<\/div>\n          <div style=\"{{ gHeadCell }}\"><\/div>\n        <\/div>\n        <sc-if value=\"{{ cartEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"padding:36px 16px;text-align:center;font-size:12.5px;color:#8D91A2\">Nenhum cliente na carteira. Clique em \u201c+ Novo cliente\u201d para cadastrar o primeiro.<\/div>\n        <\/sc-if>\n        <sc-for list=\"{{ carteiraRows }}\" as=\"cr\" hint-placeholder-count=\"0\">\n          <div>\n            <div style=\"{{ gRowCart }}\" onclick=\"{{ cr.onToggle }}\">\n              <div style=\"{{ gCellName }}\"><span style=\"color:#9aa2a9;margin-right:7px;font-size:10px\">{{ cr.chev }}<\/span>{{ cr.farmacia }}<\/div>\n              <div style=\"{{ gCellR }}\">{{ cr.tpv }}<\/div>\n              <div style=\"{{ gCellR }}\">{{ cr.meta }}<\/div>\n              <div style=\"{{ gCell }}\"><span style=\"{{ cr.atingStyle }}\">{{ cr.ating }}<\/span><\/div>\n              <div style=\"{{ gCell }}\"><span style=\"{{ cr.admStyle }}\">{{ cr.adimplencia }}<\/span><\/div>\n              <div style=\"{{ gCellMono }}\">{{ cr.renovacao }}<\/div>\n              <div style=\"{{ gCell }}\">{{ cr.responsavel }}<\/div>\n              <div style=\"{{ gCell }}\"><button onclick=\"{{ cr.onEdit }}\" style=\"{{ cr.editBtnStyle }}\">Editar<\/button><\/div>\n            <\/div>\n            <div style=\"{{ cr.detailStyle }}\">\n              <div><span style=\"{{ dLabel }}\">CNPJ<\/span><span style=\"{{ dVal }}\">{{ cr.cnpj }}<\/span><\/div>\n              <div><span style=\"{{ dLabel }}\">C\u00f3d. SAP<\/span><span style=\"{{ dVal }}\">{{ cr.sap }}<\/span><\/div>\n              <div><span style=\"{{ dLabel }}\">Contato do comercial<\/span><span style=\"{{ dVal }}\">{{ cr.contatoComercial }}<\/span><\/div>\n              <div><span style=\"{{ dLabel }}\">Telefone do cliente<\/span><span style=\"{{ dVal }}\">{{ cr.telefone }}<\/span><\/div>\n              <div style=\"grid-column:span 2\"><span style=\"{{ dLabel    <\/div>\n        <\/sc-for>\n      <\/div>\n    <\/div>\n    <\/main><\/div>\n\n  \n\n  <!-- ============ MODAL cliente ============ -->\n  <sc-if value=\"{{ hasModal }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;inset:0;background:rgba(20,26,32,.34);display:flex;align-items:center;justify-content:center;z-index:50;padding:24px\">\n      <div style=\"background:#fff;border-radius:10px;width:100%;max-width:560px;border:.5px solid #E2E3E8;max-height:92vh;overflow-y:auto\">\n        <div style=\"padding:18px 22px;border-bottom:.5px solid #E2E3E8\">\n          <span style=\"font-size:15px;font-weight:600;color:#1C2445\">{{ modalVals.title }}<\/span>\n        <\/div>\n        <div style=\"padding:20px 22px;display:flex;flex-direction:column;gap:15px\">\n          <div style=\"display:grid;grid-template-columns:1.4fr 1fr;gap:14px\">\n            <div>\n              <label style=\"{{ modalVals.labelStyle }}\">Farm\u00e1cia<\/label>\n              <input type=\"text\" value=\"{{ modalVals.vFarmacia }}\" onchange=\"{{ modalVals.onFarmacia }}\" placeholder=\"Nome da farm\u00e1cia\" style=\"{{ modalVals.fieldStyle }}\">\n            <\/div>\n            <div>\n              <label style=\"{{ modalVals.labelStyle }}\">CNPJ<\/label>\n              <input type=\"text\" value=\"{{ modalVals.vCnpj }}\" onchange=\"{{ modalVals.onCnpj }}\" placeholder=\"00.000.000/0000-00\" style=\"{{ modalVals.fieldStyle }}\">\n            <\/div>\n          <\/div>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px\">\n            <div>\n              <label style=\"{{ modalVals.labelStyle }}\">TPV adquir\u00eancia (R$/m\u00eas)<\/label>\n              <input type=\"text\" inputmode=\"numeric\" value=\"{{ modalVals.vTpv }}\" onchange=\"{{ modalVals.onTpv }}\" placeholder=\"0\" style=\"{{ modalVals.fieldStyle }}\">\n            <\/div>\n            <div>\n              <label style=\"{{ modalVals.labelStyle }}\">Meta or\u00e7ada (R$/m\u00eas  placeholder=\"(00) 00000-0000\" style=\"{{ modalVals.fieldStyle }}\">\n            <\/div>\n            <div>\n              <label style=\"{{ modalVals.labelStyle }}\">Telefone do cliente<\/label>\n              <input type=\"text\" value=\"{{ modalVals.vTelefone }}\" onchange=\"{{ modalVals.onTelefone }}\" placeholder=\"(00) 0000-0000\" style=\"{{ modalVals.fieldStyle }}\">\n            <\/div>\n          <\/div>\n          <div>\n            <label style=\"{{ modalVals.labelStyle }}\">Endere\u00e7o<\/label>\n            <input type=\"text\" value=\"{{ modalVals.vEndereco }}\" onchange=\"{{ modalVals.onEndereco }}\" placeholder=\"Rua, n\u00famero \u2014 Cidade/UF\" style=\"{{ modalVals.fieldStyle }}\">\n          <\/div>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px\">\n            <div>\n              <label style=\"{{ modalVals.labelStyle }}\">C\u00f3d. SAP<\/label>\n              <input type=\"text\" value=\"{{ modalVals.vSap }}\" onchange=\"{{ modalVals.onSap }}\" placeholder=\"SAP-00000\" style=\"{{ modalVals.fieldStyle }}\">\n            <\/div>\n            <div>\n              <label style=\"{{ modalVals.labelStyle }}\">Data de entrada<\/label>\n              <input type=\"text\" value=\"{{ modalVals.vEntrada }}\" onchange=\"{{ modalVals.onEntrada }}\" placeholder=\"dd/mm/aaaa\" style=\"{{ modalVals.fieldStyle }}\">\n            <\/div>\n            <div>\n              <label style=\"{{ modalVals.labelStyle }}\">Canal<\/label>\n              <input type=\"text\" value=\"{{ modalVals.vCanal }}\" onchange=\"{{ modalVals.onCanal }}\" placeholder=\"Origem do cliente\" style=\"{{ modalVals.fieldStyle }}\">\n            <\/div>\n          <\/div>\n          <div style=\"font-size:11px;font-weight:600;color:#8D91A2;text-transform:uppercase;letter-spacing:.05em;border-bottom:.5px solid #E2E3E8;padding-bottom:6px;margin-top:4px\">Onboarding<\/div>\n          <div>\n            <label style=\"{{ modalVals.labelStyle }}\">Produto<\ otal }}\" placeholder=\"0\" style=\"{{ modalVals.fieldStyle }}\">\n            <\/div>\n            <div>\n              <label style=\"{{ modalVals.labelStyle }}\">D\u00edvida quitada (R$)<\/label>\n              <input type=\"text\" inputmode=\"numeric\" value=\"{{ modalVals.vDividaQuitada }}\" onchange=\"{{ modalVals.onDividaQuitada }}\" placeholder=\"0\" style=\"{{ modalVals.fieldStyle }}\">\n            <\/div>\n            <div>\n              <label style=\"{{ modalVals.labelStyle }}\">Limite operado (R$)<\/label>\n              <input type=\"text\" inputmode=\"numeric\" value=\"{{ modalVals.vLimiteOperado }}\" onchange=\"{{ modalVals.onLimiteOperado }}\" placeholder=\"0\" style=\"{{ modalVals.fieldStyle }}\">\n            <\/div>\n          <\/div>\n          <div>\n            <label style=\"{{ modalVals.labelStyle }}\">Observa\u00e7\u00e3o<\/label>\n            <textarea value=\"{{ modalVals.vObs }}\" onchange=\"{{ modalVals.onObs }}\" rows=\"2\" placeholder=\"Anota\u00e7\u00f5es sobre o cliente\" style=\"{{ modalVals.fieldStyle }}\"><\/textarea>\n          <\/div>\n        <\/div>\n        <div style=\"padding:16px 22px;border-top:.5px solid #E2E3E8;display:flex;align-items:center;justify-content:flex-end;gap:10px\">\n          <sc-if value=\"{{ modalVals.isEdit }}\" hint-placeholder-val=\"{{ false }}\">\n            <button onclick=\"{{ modalVals.onDelete }}\" style=\"{{ modalVals.dangerBtn }}\">Remover<\/button>\n          <\/sc-if>\n          <button onclick=\"{{ modalVals.onCancel }}\" style=\"{{ modalVals.ghostBtn }}\">Cancelar<\/button>\n          <button onclick=\"{{ modalVals.onSave }}\" style=\"{{ modalVals.primaryBtn }}\">Salvar<\/button>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/sc-if>\n\n  <!-- ============ MODAL relat\u00f3rio Dock ============ -->\n  <sc-if value=\"{{ hasReport }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;inset:0;background:rgba(20,26,32,.34);display:flex;align-items:center;justify-con
